<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法典图鉴 · NovelAI 提示词</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<header class="topbar">
  <button id="menuBtn" class="icon-btn" title="目录">☰</button>
  <div class="brand">法典<span>图鉴</span></div>

  <label class="codex-pick">
    <select id="codexSelect"></select>
  </label>

  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input id="search" type="search" placeholder="搜索词条或 tag（中 / 英）…" autocomplete="off">
  </div>

  <label class="filter-btn" title="只看有图" aria-label="只看有图">
    <input type="checkbox" id="onlyImaged">
    <span class="filter-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="3" y="5" width="18" height="14" rx="2.5"/>
        <circle cx="8.5" cy="10" r="1.6"/>
        <path d="m4.5 17 4.8-4.8a1.5 1.5 0 0 1 2.1 0L16.2 17"/>
        <path d="m13.8 14.6 1.4-1.4a1.5 1.5 0 0 1 2.1 0L20 16"/>
      </svg>
    </span>
  </label>
  <label class="filter-btn" title="只看收藏" aria-label="只看收藏">
    <input type="checkbox" id="onlyFav">
    <span class="filter-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="m12 3.8 2.5 5 5.5.8-4 3.9.9 5.5-4.9-2.6L7.1 19l.9-5.5-4-3.9 5.5-.8L12 3.8Z"/>
      </svg>
    </span>
  </label>
  <div class="topbar-actions">
    <a href="/strings.html" class="nav-link">画风串</a>
    <a class="icon-btn github-btn" href="https://github.com/AgIzT/NovelAI-Tag" target="_blank" rel="noopener" title="GitHub 仓库" aria-label="GitHub 仓库">
      <svg class="github-mark" viewBox="0 0 98 96" fill="currentColor" aria-hidden="true"><path d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.527 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0Z"/></svg>
    </a>
    <button id="themeBtn" class="icon-btn theme-btn" type="button" title="深色 / 浅色" aria-label="切换深色模式"></button>
  </div>
</header>

<div class="layout">
  <aside id="sidebar" class="sidebar">
    <div class="sb-head">
      <span id="codexTitle" class="codex-title"></span>
      <span id="codexMeta" class="codex-meta"></span>
    </div>
    <nav id="tree" class="tree"></nav>
  </aside>

  <main class="main" id="main">
    <div class="result-bar"><span id="resultInfo"></span></div>
    <div id="loading" class="loading">正在加载词条数据…</div>
    <div id="masonry" class="masonry"></div>
    <div id="sentinel" class="sentinel"></div>
    <div id="empty" class="empty" hidden>这里还没有词条</div>
  </main>
</div>

<div id="toast" class="toast"></div>

<div id="lightbox" class="lightbox" hidden>
  <div id="lightboxPanel" class="lightbox-panel">
    <button id="lightboxClose" class="lightbox-close" type="button" aria-label="关闭">×</button>
    <button id="lightboxPrev" class="lightbox-nav lightbox-prev" type="button" aria-label="上一张">‹</button>
    <div class="lightbox-stage">
      <img id="lightboxImg" alt="例图">
    </div>
    <button id="lightboxNext" class="lightbox-nav lightbox-next" type="button" aria-label="下一张">›</button>
    <aside class="lightbox-info">
      <div class="lightbox-head">
        <h2 id="lightboxTitle"></h2>
        <div id="lightboxMeta" class="lightbox-meta"></div>
      </div>
      <div class="lightbox-actions">
        <button id="copyAll" type="button">复制全部</button>
        <button id="copyRawTag" type="button">复制当前图 Raw</button>
      </div>
      <div class="lightbox-section">
        <div class="section-head">
          <div class="section-label">正向 tags</div>
          <button id="copyPositive" type="button">复制正向</button>
        </div>
        <pre id="lightboxTags"></pre>
      </div>
      <div id="negativeBlock" class="lightbox-section">
        <div class="section-head">
          <div class="section-label">Negative</div>
          <button id="copyNegative" type="button">复制负面</button>
        </div>
        <pre id="lightboxNegative"></pre>
      </div>
      <div id="noteBlock" class="lightbox-section">
        <div class="section-label">Note</div>
        <pre id="lightboxNote"></pre>
      </div>
      <div id="lightboxThumbs" class="lightbox-thumbs"></div>
    </aside>
  </div>
</div>

<template id="cardTpl">
  <article class="card">
    <div class="card-img-wrap" hidden>
      <img class="card-img" loading="lazy" alt="">
      <div class="card-badges">
        <span class="badge-neg" hidden>负面词</span>
        <span class="badge-count" hidden><svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M2 4.25A2.25 2.25 0 014.25 2h6.5A2.25 2.25 0 0113 4.25V5.5H9.25A3.75 3.75 0 005.5 9.25V13H4.25A2.25 2.25 0 012 10.75z"/><path d="M9.25 7A2.25 2.25 0 007 9.25v6.5A2.25 2.25 0 009.25 18h6.5A2.25 2.25 0 0018 15.75v-6.5A2.25 2.25 0 0015.75 7z"/></svg><span class="badge-count-n">1</span></span>
      </div>
      <button class="zoom-btn" title="放大查看">🔍</button>
    </div>
    <div class="card-body">
      <div class="card-title-row">
        <h3 class="card-title"></h3>
        <span class="badge-new" hidden>NEW</span>
        <span class="badge-neg-chip" hidden title="含负面提示词">负面</span>
        <button class="fav-btn" type="button" title="收藏" aria-label="收藏">☆</button>
      </div>
      <div class="card-tags"></div>
      <div class="card-foot">
        <span class="card-path"></span>
        <span class="card-actions">
          <button class="mini-copy copy-negative" type="button" hidden>负面</button>
          <button class="mini-copy copy-all" type="button" hidden>全部</button>
          <span class="copy-hint">📋 点击复制</span>
        </span>
      </div>
    </div>
  </article>
</template>

<script src="assets/app.js"></script>
</body>
</html>
