<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法典图鉴 · NovelAI 提示词</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<header class="topbar">
  <button id="menuBtn" class="icon-btn" title="目录">☰</button>
  <div class="brand">法典<span>图鉴</span></div>

  <label class="codex-pick">
    <select id="codexSelect"></select>
  </label>

  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input id="search" type="search" placeholder="搜索词条或 tag（中 / 英）…" autocomplete="off">
  </div>

  <label class="toggle" title="只显示已配图的词条">
    <input type="checkbox" id="onlyImaged"><span>只看有图</span>
  </label>
  <label class="toggle" title="只显示收藏的词条">
    <input type="checkbox" id="onlyFav"><span>⭐ 收藏</span>
  </label>
  <div class="topbar-actions">
    <a href="/strings.html" style="text-decoration:none;font-size:12px;color:var(--muted);padding:6px 12px;border:1px solid var(--line);border-radius:8px;transition:all .15s;white-space:nowrap" onmouseenter="this.style.background='var(--tagbg)';this.style.color='var(--text)'" onmouseleave="this.style.background='transparent';this.style.color='var(--muted)'">切换到画风</a>
    <a class="icon-btn github-btn" href="https://github.com/AgIzT/NovelAI-Tag" target="_blank" rel="noopener" title="GitHub 仓库" aria-label="GitHub 仓库">
      <svg class="github-mark" viewBox="0 0 98 96" fill="currentColor" aria-hidden="true"><path d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.527 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0Z"/></svg>
    </a>
    <button id="themeBtn" class="icon-btn theme-btn" type="button" title="深色 / 浅色" aria-label="切换深色模式"></button>
  </div>
</header>

<div class="layout">
  <aside id="sidebar" class="sidebar">
    <div class="sb-head">
      <span id="codexTitle" class="codex-title"></span>
      <span id="codexMeta" class="codex-meta"></span>
    </div>
    <nav id="tree" class="tree"></nav>
  </aside>

  <main class="main" id="main">
    <div class="result-bar"><span id="resultInfo"></span></div>
    <div id="loading" class="loading">正在加载词条数据…</div>
    <div id="masonry" class="masonry"></div>
    <div id="sentinel" class="sentinel"></div>
    <div id="empty" class="empty" hidden>这里还没有词条</div>
  </main>
</div>

<div id="toast" class="toast"></div>

<div id="lightbox" class="lightbox" hidden>
  <img id="lightboxImg" alt="例图">
</div>

<template id="cardTpl">
  <article class="card">
    <div class="card-img-wrap" hidden>
      <img class="card-img" loading="lazy" alt="">
      <button class="zoom-btn" title="放大查看">🔍</button>
    </div>
    <div class="card-body">
      <div class="card-title-row">
        <h3 class="card-title"></h3>
        <span class="badge-new" hidden>NEW</span>
        <button class="fav-btn" type="button" title="收藏" aria-label="收藏">☆</button>
      </div>
      <div class="card-tags"></div>
      <div class="card-foot">
        <span class="card-path"></span>
        <span class="copy-hint">📋 点击复制</span>
      </div>
    </div>
  </article>
</template>

<script src="assets/app.js"></script>
</body>
</html>
